services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fleetoss-prod-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: fleetoss
      POSTGRES_USER: fleetoss
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fleetoss_dev}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleetoss']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fleetoss-prod-cache
    restart: unless-stopped
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: fleetoss-prod-storage
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-fleetoss}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-fleetoss_dev}
    volumes:
      - minio_data_prod:/data
    command: server /data --console-address ':9001'

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetoss-prod-server
    restart: unless-stopped
    ports:
      - '4001:4000'
      - '5055:5055'
    environment:
      NODE_ENV: production
      PORT: '4000'
      HOST: '0.0.0.0'
      DATABASE_URL: postgres://fleetoss:${DB_PASSWORD:-fleetoss_dev}@postgres:5432/fleetoss
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_USER:-fleetoss}
      S3_SECRET_KEY: ${MINIO_PASSWORD:-fleetoss_dev}
      S3_BUCKET: ${S3_BUCKET:-fleetoss}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: fleetoss-prod-app
    restart: unless-stopped
    expose:
      - '80'
    depends_on:
      - server

volumes:
  pgdata_prod:
  minio_data_prod:
