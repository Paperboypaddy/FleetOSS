services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fleetoss-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: fleetoss
      POSTGRES_USER: fleetoss
      POSTGRES_PASSWORD: fleetoss_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleetoss']
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible storage (optional — for file attachments, backups)
  minio:
    image: minio/minio:latest
    container_name: fleetoss-storage
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: fleetoss
      MINIO_ROOT_PASSWORD: fleetoss_dev
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'

  # Redis for caching and pub/sub (optional — for rate limiting, sessions)
  redis:
    image: redis:7-alpine
    container_name: fleetoss-cache
    restart: unless-stopped
    ports:
      - '6379:6379'

  # Keycloak for testing OIDC, SAML, and OAuth2 auth providers
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: fleetoss-keycloak
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_RELATIVE_PATH: /
    command: start-dev --import-realm
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

volumes:
  pgdata:
  minio_data:
  keycloak_data:
