name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build -w packages/core
      - run: npx tsc --noEmit -p packages/server/tsconfig.json
      - run: cd app && npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fleetoss
          POSTGRES_USER: fleetoss
          POSTGRES_PASSWORD: fleetoss_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleetoss"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build -w packages/core
      - run: npm run build -w packages/server
        env:
          DATABASE_URL: postgres://fleetoss:fleetoss_test@localhost:5432/fleetoss
      - name: Run migrations
        run: npx tsx packages/server/src/db/migrate.ts
        env:
          DATABASE_URL: postgres://fleetoss:fleetoss_test@localhost:5432/fleetoss
      - name: Run server unit tests
        run: npm run test -w packages/server
        env:
          JWT_SECRET: test-secret
          DATABASE_URL: postgres://fleetoss:fleetoss_test@localhost:5432/fleetoss

      - name: Integration smoke test
        run: |
          node packages/server/dist/index.js &
          SERVER_PID=$!
          sleep 2
          curl -sf http://localhost:4000/api/health
          kill $SERVER_PID
        env:
          DATABASE_URL: postgres://fleetoss:fleetoss_test@localhost:5432/fleetoss
          JWT_SECRET: test-secret
          PORT: '4000'

      - name: Run frontend tests
        run: cd app && npx vitest run --config vitest.config.mjs

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/server:latest, ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/server:${{ github.sha }}
      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: app/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/app:latest, ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/app:${{ github.sha }}
      - name: Build and push selfhosted image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.selfhosted
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:latest, ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:${{ github.sha }}

      - name: Smoke test selfhosted image
        run: |
          docker run -d --name fleetoss-smoke \
            -p 4080:80 \
            -e DOMAIN= \
            -e EMAIL= \
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:${{ github.sha }}
          sleep 5
          curl -sf http://localhost:4080/ | grep -q '<title' || (echo "Frontend failed"; exit 1)
          curl -sf http://localhost:4080/api/health | grep -q '"status":"ok"' || (echo "API health failed"; exit 1)
          docker rm -f fleetoss-smoke
