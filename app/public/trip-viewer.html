<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Trip Viewer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:sans-serif; background:#0F1117; color:#E2E8F0; }
  #upload { padding:20px; text-align:center; }
  #upload label { display:inline-block; padding:10px 24px; background:#00D4FF; color:#0F1117; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
  #upload input { display:none; }
  #map { width:100vw; height:100vh; }
  #info { position:absolute; top:12px; left:12px; z-index:1000; background:rgba(28,33,48,0.9); padding:8px 14px; border-radius:8px; font-size:12px; border:1px solid #2E3650; display:none; }
</style>
</head>
<body>
<div id="upload">
  <p style="margin-bottom:12px;color:#94A3B8;font-size:13px">Upload a CSV with lat,lng (and optional speed) to view the trip</p>
  <label for="csv">Choose CSV File</label>
  <input type="file" id="csv" accept=".csv"/>
</div>
<div id="map" style="display:none"></div>
<div id="info"></div>
<script>
document.getElementById('csv').onchange = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const text = ev.target.result;
    const lines = text.trim().split('\n').slice(1).filter(l => l.trim());
    const coords = [];
    const speeds = [];
    for (const line of lines) {
      const parts = line.split(',');
      const lat = parseFloat(parts[0].replace(/"/g,''));
      const lng = parseFloat(parts[1].replace(/"/g,''));
      const spd = parseFloat(parts[4]) || 0;
      if (!isNaN(lat) && !isNaN(lng)) {
        coords.push([lat, lng]);
        speeds.push(spd);
      }
    }
    if (coords.length < 2) { alert('Need at least 2 points'); return; }
    document.getElementById('upload').style.display = 'none';
    document.getElementById('map').style.display = 'block';
    const map = L.map('map').setView(coords[0], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
    L.polyline(coords, { color:'#00D4FF', weight:3, opacity:0.8 }).addTo(map);
    L.circleMarker(coords[0], { color:'#10B981', radius:8, fillColor:'#10B981', fillOpacity:1 }).addTo(map).bindPopup('Start');
    L.circleMarker(coords[coords.length-1], { color:'#EF4444', radius:8, fillColor:'#EF4444', fillOpacity:1 }).addTo(map).bindPopup('End');
    for (let i = 0; i < coords.length - 1; i++) {
      const spd = speeds[i] || 0;
      const color = spd >= 60 ? '#EF4444' : spd >= 40 ? '#F59E0B' : spd >= 20 ? '#10B981' : '#64748B';
      L.polyline([coords[i], coords[i+1]], { color, weight:4, opacity:0.6 }).addTo(map);
    }
    const info = document.getElementById('info');
    info.style.display = 'block';
    info.innerHTML = coords.length + ' points &middot; ' + coords[0][0].toFixed(4) + ', ' + coords[0][1].toFixed(4);
    map.fitBounds(L.latLngBounds(coords), { padding:[40,40] });
  };
  reader.readAsText(file);
};
</script>
</body>
</html>
