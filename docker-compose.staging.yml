services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fleetoss-staging-db
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_DB: fleetoss_staging
      POSTGRES_USER: fleetoss
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fleetoss_staging}
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleetoss']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fleetoss-staging-cache
    restart: unless-stopped
    ports:
      - '6381:6379'

  fleetoss:
    build:
      context: .
      dockerfile: Dockerfile.selfhosted
    container_name: fleetoss-staging
    restart: unless-stopped
    ports:
      - '8080:80'
      - '8443:443'
      - '5055:5055'
      - '5001:5001'
      - '5002:5002'
      - '5004:5004'
      - '5056:5056'
      - '5100:5100'
    environment:
      DOMAIN: '${DOMAIN:-}'
      EMAIL: '${EMAIL:-}'
      PORT: '4000'
      HOST: '0.0.0.0'
      DATABASE_URL: postgres://fleetoss:${DB_PASSWORD:-fleetoss_staging}@postgres:5432/fleetoss_staging
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata_staging:
